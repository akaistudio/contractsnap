<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContractSnap — New Contract</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:#f0f4f8;min-height:100vh}.topbar{background:#141926;border-bottom:1px solid #2A3148;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}.topbar h1{font-size:20px;font-weight:700;color:#E8ECF4}.topbar h1 span{color:#0d9488}.topbar a{font-size:13px;color:#8B95B0;text-decoration:none;padding:8px 14px;border-radius:8px}.main{max-width:800px;margin:0 auto;padding:24px}h2{font-size:22px;font-weight:700;color:#E8ECF4;margin-bottom:20px}.card{background:#141926;border-radius:12px;padding:24px;margin-bottom:20px}.card h3{font-size:15px;font-weight:700;color:#C8D0E0;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #2A3148}.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}.form-group{margin-bottom:16px}.form-group label{display:block;font-size:13px;font-weight:600;color:#C8D0E0;margin-bottom:5px}.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid #2A3148;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif}.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#0d9488;min-height:100px}.hint{font-size:12px;color:#94a3b8;margin-top:3px}.btn{padding:13px 28px;background:#0d9488;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}.btn:hover{background:#0f766e}.btn-secondary{background:#2A3148;color:#C8D0E0;border:1.5px solid #2A3148}.btn-secondary:hover{background:#2A3148}.btn-sm{padding:8px 14px;font-size:13px;border-radius:6px}.actions{display:flex;justify-content:flex-end;gap:12px}.milestone-row{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;margin-bottom:8px;align-items:end}.milestone-row input{padding:8px 10px;border:1.5px solid #2A3148;border-radius:6px;font-size:13px}.remove-btn{padding:8px 12px;background:#fee2e2;color:#dc2626;border:none;border-radius:6px;cursor:pointer;font-size:13px}
        @media(max-width:768px){
            .row,.row-3{grid-template-columns:1fr}
            .milestone-row{grid-template-columns:1fr 1fr;gap:8px}
            .milestone-row .remove-btn{grid-column:1/-1;width:100%}
            .topbar{flex-wrap:wrap;gap:6px;padding:10px 14px}
            .topbar a{font-size:12px;padding:5px 8px}
            .main{padding:12px}
            .card{padding:16px}
            .actions{flex-direction:column}
            .actions .btn{width:100%;text-align:center}
            input,select,textarea{font-size:16px!important}
        }
    </style>
</head>
<body>
<div class="topbar"><a href="/login" style="text-decoration:none;color:inherit"><h1>Contract<span>Snap</span></h1></a><a href="/">← Dashboard</a><a href="https://snapsuite.up.railway.app" target="_blank" style="font-size:11px;color:#8B95B0;text-decoration:none;padding:5px 10px;border:1px solid #2A3148;border-radius:6px;font-weight:600">Suite</a><div style="position:relative;display:inline-block"><button onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'" style="font-size:14px;background:none;border:1px solid #2A3148;border-radius:6px;padding:5px 10px;color:#8B95B0;cursor:pointer" title="Switch App">⊞</button><div style="display:none;position:absolute;right:0;top:32px;background:#141926;border:1px solid #2A3148;border-radius:10px;padding:8px;min-width:180px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.5)"><a href="https://invoicesnap.up.railway.app" style="display:block;padding:8px 12px;color:#E8ECF4;text-decoration:none;border-radius:6px;font-size:13px;font-weight:500" onmouseover="this.style.background='#2A3148'" onmouseout="this.style.background='none'">📄 InvoiceSnap</a><a href="https://expensesnap.up.railway.app" style="display:block;padding:8px 12px;color:#E8ECF4;text-decoration:none;border-radius:6px;font-size:13px;font-weight:500" onmouseover="this.style.background='#2A3148'" onmouseout="this.style.background='none'">📸 ExpenseSnap</a><a href="https://payslipsnap.up.railway.app" style="display:block;padding:8px 12px;color:#E8ECF4;text-decoration:none;border-radius:6px;font-size:13px;font-weight:500" onmouseover="this.style.background='#2A3148'" onmouseout="this.style.background='none'">💰 PayslipSnap</a><a href="https://proposalsnap.up.railway.app" style="display:block;padding:8px 12px;color:#E8ECF4;text-decoration:none;border-radius:6px;font-size:13px;font-weight:500" onmouseover="this.style.background='#2A3148'" onmouseout="this.style.background='none'">🎯 ProposalSnap</a></div></div></div>
<div class="main">
    <h2>+ New Contract</h2>
    <form method="POST">
        <div class="card">
            <h3>Contract Details</h3>
            <div class="form-group"><label>Title *</label><input type="text" name="title" required placeholder="e.g. Website Redesign Project"></div>
            <div class="row">
                <div class="form-group"><label>Type</label>
                    <select name="contract_type">
                        <option value="service">Service Agreement</option>
                        <option value="retainer">Retainer Agreement</option>
                        <option value="sow">Statement of Work (SOW)</option>
                        <option value="freelance">Freelancer Agreement</option>
                        <option value="nda">NDA</option>
                    </select>
                </div>
                <div class="form-group"><label>Status</label>
                    <select name="status"><option value="draft">Draft</option><option value="sent">Sent</option><option value="signed">Signed</option><option value="active" selected>Active</option></select>
                </div>
            </div>
            <div class="row-3">
                <div class="form-group"><label>Start Date</label><input type="date" name="start_date"></div>
                <div class="form-group"><label>End Date</label><input type="date" name="end_date"></div>
                <div class="form-group"><label>Contract Value ({{ cs }})</label><input type="number" name="total_value" min="0" step="0.01" placeholder="0.00"></div>
            </div>
            <div class="form-group"><label>PO Number (if applicable)</label><input type="text" name="po_number" placeholder="e.g. PO-2026-001"></div>
        </div>

        <div class="card">
            <h3>Client</h3>
            <div class="form-group"><label>Select Existing Client</label>
                <select name="client_id" id="clientSelect" onchange="toggleNewClient()">
                    <option value="">— New Client —</option>
                    {% for c in clients %}<option value="{{ c.id }}">{{ c.name }} ({{ c.email }})</option>{% endfor %}
                </select>
            </div>
            <div id="newClient">
                <div class="row">
                    <div class="form-group"><label>Client Name</label><input type="text" name="client_name" placeholder="Company / Person name"></div>
                    <div class="form-group"><label>Contact Person</label><input type="text" name="contact_person" placeholder="Primary contact"></div>
                </div>
                <div class="row">
                    <div class="form-group"><label>Email</label><input type="email" name="client_email"></div>
                    <div class="form-group"><label>Address</label><input type="text" name="client_address"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3>Scope & Terms</h3>
            <div class="form-group"><label>Scope of Work</label><textarea name="scope_of_work" placeholder="Describe what work will be performed..."></textarea></div>
            <div class="form-group"><label>Deliverables</label><textarea name="deliverables" placeholder="List what will be delivered..." style="min-height:80px"></textarea></div>
            <div class="form-group"><label>Payment Terms</label><input type="text" name="payment_terms" placeholder="e.g. 50% upfront, 50% on completion. Net 30."></div>
            <div class="form-group"><label>Terms & Conditions</label><textarea name="terms_conditions" placeholder="Cancellation, IP ownership, confidentiality, etc."></textarea></div>
            <div class="form-group"><label>Notes</label><textarea name="notes" placeholder="Internal notes (won't appear on PDF)" style="min-height:60px"></textarea></div>
        </div>

        <div class="card">
            <h3>Milestones / Payment Schedule <span style="font-size:13px;font-weight:400;color:#94a3b8">(optional)</span></h3>
            <div id="milestones">
                <div class="milestone-row">
                    <div><label style="font-size:12px;color:#8B95B0;font-weight:600">Milestone</label><input type="text" name="milestone_title[]" placeholder="e.g. Phase 1 Delivery"></div>
                    <div><label style="font-size:12px;color:#8B95B0;font-weight:600">Amount ({{ cs }})</label><input type="number" name="milestone_amount[]" min="0" step="0.01" placeholder="0"></div>
                    <div><label style="font-size:12px;color:#8B95B0;font-weight:600">Due Date</label><input type="date" name="milestone_date[]"></div>
                    <button type="button" class="remove-btn" onclick="this.parentElement.remove()">✕</button>
                </div>
            </div>
            <button type="button" class="btn-secondary btn-sm" onclick="addMilestone()" style="margin-top:8px">+ Add Milestone</button>
        </div>

        <div class="actions">
            <a href="/" class="btn btn-secondary" style="text-decoration:none">Cancel</a>
            <button type="submit" class="btn">📝 Create Contract</button>
        </div>
    </form>
</div>
<script>
function toggleNewClient(){document.getElementById('newClient').style.display=document.getElementById('clientSelect').value?'none':'block'}
function addMilestone(){
    const div=document.createElement('div');div.className='milestone-row';
    div.innerHTML='<div><input type="text" name="milestone_title[]" placeholder="Milestone"></div><div><input type="number" name="milestone_amount[]" min="0" step="0.01" placeholder="0"></div><div><input type="date" name="milestone_date[]"></div><button type="button" class="remove-btn" onclick="this.parentElement.remove()">✕</button>';
    document.getElementById('milestones').appendChild(div);
}
</script>
</body></html>
