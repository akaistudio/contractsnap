<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContractSnap — Review PO</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:#f0f4f8;min-height:100vh}.topbar{background:#141926;border-bottom:1px solid #2A3148;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}.topbar h1{font-size:20px;font-weight:700;color:#E8ECF4}.topbar h1 span{color:#0d9488}.topbar a{font-size:13px;color:#8B95B0;text-decoration:none;padding:8px 14px;border-radius:8px}.main{max-width:800px;margin:0 auto;padding:24px}h2{font-size:22px;font-weight:700;color:#E8ECF4;margin-bottom:6px}.subtitle{color:#8B95B0;font-size:14px;margin-bottom:24px}.card{background:#141926;border-radius:12px;padding:24px;margin-bottom:20px}.card h3{font-size:15px;font-weight:700;color:#C8D0E0;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #2A3148}.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}.form-group{margin-bottom:16px}.form-group label{display:block;font-size:13px;font-weight:600;color:#C8D0E0;margin-bottom:5px}.form-group input,.form-group textarea{width:100%;padding:10px 12px;border:1.5px solid #2A3148;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif}.form-group textarea{resize:vertical;min-height:100px}.btn{padding:13px 28px;background:#0d9488;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}.btn:hover{background:#0f766e}.actions{display:flex;justify-content:flex-end;gap:12px}.ai-badge{background:#f0fdfa;color:#0d9488;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;display:inline-block;margin-bottom:16px}
@media(max-width:768px){
  .topbar{flex-wrap:wrap;gap:6px;padding:10px 14px!important}
  .topbar-right{flex-wrap:wrap;gap:4px}
  .topbar-right a{font-size:12px!important;padding:5px 8px!important}
  .hide-mobile,.topbar-right a span.hide-mobile{display:none!important}
  .main{padding:12px!important}
  .stats{grid-template-columns:repeat(2,1fr)!important}
  .stat-card{padding:14px!important}
  .stat-card .value{font-size:22px!important}
  .card{padding:16px!important;overflow-x:auto}
  .table-wrap{overflow-x:auto!important}
  table{min-width:480px}
  th,td{padding:8px 10px!important;font-size:12px!important}
  input,select,textarea{font-size:16px!important}
  .g2,.g3,.row2,.row3,.grid-2,.grid-3{grid-template-columns:1fr!important}
  form .row,form .row2,.form-row{grid-template-columns:1fr!important}
}
</style>
</head>
<body>
<div class="topbar"><a href="/welcome" style="text-decoration:none;color:inherit"><h1>Contract<span>Snap</span></h1></a><a href="/">← Dashboard</a><a href="https://snapsuite.up.railway.app" target="_blank" style="font-size:11px;color:#8B95B0;text-decoration:none;padding:5px 10px;border:1px solid #2A3148;border-radius:6px;font-weight:600">Suite</a><div style="position:relative;display:inline-block"><button onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'" style="font-size:14px;background:none;border:1px solid #2A3148;border-radius:6px;padding:5px 10px;color:#8B95B0;cursor:pointer" title="Switch App">⊞</button><div style="display:none;position:absolute;right:0;top:32px;background:#141926;border:1px solid #2A3148;border-radius:10px;padding:8px;min-width:180px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.5)"><a href="https://invoicesnap.up.railway.app" style="display:block;padding:8px 12px;color:#E8ECF4;text-decoration:none;border-radius:6px;font-size:13px;font-weight:500" onmouseover="this.style.background='#2A3148'" onmouseout="this.style.background='none'">📄 InvoiceSnap</a><a href="https://expensesnap.up.railway.app" style="display:block;padding:8px 12px;color:#E8ECF4;text-decoration:none;border-radius:6px;font-size:13px;font-weight:500" onmouseover="this.style.background='#2A3148'" onmouseout="this.style.background='none'">📸 ExpenseSnap</a><a href="https://payslipsnap.up.railway.app" style="display:block;padding:8px 12px;color:#E8ECF4;text-decoration:none;border-radius:6px;font-size:13px;font-weight:500" onmouseover="this.style.background='#2A3148'" onmouseout="this.style.background='none'">💰 PayslipSnap</a><a href="https://proposalsnap.up.railway.app" style="display:block;padding:8px 12px;color:#E8ECF4;text-decoration:none;border-radius:6px;font-size:13px;font-weight:500" onmouseover="this.style.background='#2A3148'" onmouseout="this.style.background='none'">🎯 ProposalSnap</a></div></div></div>
<div class="main">
    <h2>📄 Review Extracted PO</h2>
    <p class="subtitle">AI extracted the data below. Review and correct before saving.</p>
    <span class="ai-badge">🤖 AI Extracted — Please verify</span>

    <form method="POST" action="/save-po">
        <input type="hidden" name="po_file_data" value="{{ po_file_data }}">

        <div class="card">
            <h3>PO Details</h3>
            <div class="row">
                <div class="form-group"><label>Title</label><input type="text" name="title" value="{{ extracted.get('client_name', '') }} — Purchase Order" required></div>
                <div class="form-group"><label>PO Number</label><input type="text" name="po_number" value="{{ extracted.get('po_number', '') }}"></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Issue Date</label><input type="date" name="start_date" value="{{ extracted.get('issue_date', '') }}"></div>
                <div class="form-group"><label>Delivery/End Date</label><input type="date" name="end_date" value="{{ extracted.get('delivery_date', '') }}"></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Total Value</label><input type="number" name="total_value" step="0.01" value="{{ extracted.get('total_value', 0) }}"></div>
                <div class="form-group"><label>Payment Terms</label><input type="text" name="payment_terms" value="{{ extracted.get('payment_terms', '') }}"></div>
            </div>
        </div>

        <div class="card">
            <h3>Client</h3>
            <div class="row">
                <div class="form-group"><label>Client Name</label><input type="text" name="client_name" value="{{ extracted.get('client_name', '') }}"></div>
                <div class="form-group"><label>Contact Person</label><input type="text" name="contact_person" value="{{ extracted.get('contact_person', '') }}"></div>
            </div>
            <div class="row">
                <div class="form-group"><label>Email</label><input type="email" name="client_email" value=""></div>
                <div class="form-group"><label>Address</label><input type="text" name="client_address" value="{{ extracted.get('client_address', '') }}"></div>
            </div>
        </div>

        <div class="card">
            <h3>Scope of Work</h3>
            <div class="form-group"><textarea name="scope_of_work">{{ extracted.get('scope_of_work', '') }}{% if extracted.get('items') %}{% for it in extracted.items %}
- {{ it.description }} (Qty: {{ it.quantity }}, Amount: {{ it.amount }}){% endfor %}{% endif %}</textarea></div>
            <div class="form-group"><label>Notes</label><textarea name="notes" style="min-height:60px">{{ extracted.get('notes', '') }}</textarea></div>
        </div>

        <div class="actions">
            <a href="/upload-po" class="btn" style="background:#2A3148;color:#C8D0E0;text-decoration:none">← Re-upload</a>
            <button type="submit" class="btn">💾 Save Purchase Order</button>
        </div>
    </form>
</div>
</body></html>
